<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e" />
      <stop offset="100%" stop-color="#0d47a1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f57c00" />
      <stop offset="100%" stop-color="#ff9800" />
    </linearGradient>
  </defs>
  
  <!-- Architectural Mark -->
  <g transform="translate(40, 20)">
    <rect x="0" y="30" width="20" height="50" fill="url(#grad1)" rx="2" />
    <rect x="25" y="10" width="20" height="70" fill="url(#grad1)" rx="2" />
    <rect x="50" y="40" width="20" height="40" fill="url(#grad1)" rx="2" />
    
    <!-- Amber accent window/light -->
    <rect x="30" y="20" width="10" height="10" fill="url(#grad2)" rx="1" />
    <rect x="30" y="40" width="10" height="10" fill="url(#grad2)" rx="1" />
  </g>

  <!-- Text -->
  <text x="130" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="72" fill="#1a237e" letter-spacing="-2">bloq<tspan fill="#f57c00">5</tspan></text>
</svg>