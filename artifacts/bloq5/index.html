<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>BLOQ5 — Gestion Immobilière Locative au Canada et en France</title>
    <meta name="description" content="BLOQ5 est la plateforme PropTech de gestion locative résidentielle et commerciale au Canada et en France. Trouvez votre appartement, maison, bureau ou local — signez votre bail en ligne." />
    <meta name="keywords" content="BLOQ5, bloq5, gestion immobilière, location appartement, location maison, location bureau, gestion locative, PropTech, Canada, Montréal, Québec, Toronto, France, Paris" />
    <meta name="author" content="BLOQ5" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.bloq5.com/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.bloq5.com/" />
    <meta property="og:site_name" content="BLOQ5" />
    <meta property="og:title" content="BLOQ5 — Gestion Immobilière Locative au Canada et en France" />
    <meta property="og:description" content="La plateforme PropTech qui simplifie la location pour tous — appartements, maisons, bureaux, commerces. Signez votre bail en ligne avec BLOQ5." />
    <meta property="og:image" content="https://www.bloq5.com/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="fr_CA" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@bloq5" />
    <meta name="twitter:title" content="BLOQ5 — Gestion Immobilière Locative" />
    <meta name="twitter:description" content="La plateforme PropTech qui simplifie la location pour tous — appartements, maisons, bureaux, commerces." />
    <meta name="twitter:image" content="https://www.bloq5.com/opengraph.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "BLOQ5",
      "url": "https://www.bloq5.com",
      "logo": "https://www.bloq5.com/logo.svg",
      "description": "Plateforme PropTech de gestion locative résidentielle et commerciale au Canada et en France.",
      "email": "support@bloq5.com",
      "telephone": "+15816688274",
      "address": [
        {
          "@type": "PostalAddress",
          "addressLocality": "Montréal",
          "addressRegion": "QC",
          "addressCountry": "CA"
        },
        {
          "@type": "PostalAddress",
          "addressLocality": "Paris",
          "addressCountry": "FR"
        }
      ],
      "sameAs": [
        "https://www.bloq5.com"
      ]
    }
    </script>

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "BLOQ5",
      "url": "https://www.bloq5.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.bloq5.com/properties?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
